<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>Daily Clip Hub - 测试版</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
    }

    header {
      position: sticky;
      top: 0;
      background-color: #1a1a1a;
      color: white;
      padding: 15px 20px;
      font-size: 20px;
      z-index: 100;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 15px;
      gap: 15px;
    }

    .card {
      background-color: white;
      width: 300px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .thumbnail {
      width: 100%;
      height: 170px;
      background-size: cover;
      background-position: center;
    }

    .card-content {
      padding: 10px 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
